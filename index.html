    muted:  theme.surface2,
    accent: theme.accentSoft,
    ok:     `color-mix(in oklch, ${theme.ok} 16%, transparent)`,
    warn:   `color-mix(in oklch, ${theme.warn} 16%, transparent)`,
    danger: `color-mix(in oklch, ${theme.danger} 16%, transparent)`,
    info:   `color-mix(in oklch, ${theme.info} 16%, transparent)`,
  }[tone];
  const fg = {
    muted:  theme.ink2,
    accent: theme.accent,
    ok:     theme.ok,
    warn:   theme.warn,
    danger: theme.danger,
    info:   theme.info,
  }[tone];
  const padY = size === "xs" ? 2 : 3;
  const padX = size === "xs" ? 6 : 8;
  const fs   = size === "xs" ? 10 : 11;
  return (
    <span style={{
      display: "inline-flex", alignItems: "center", gap: 5,
      padding: `${padY}px ${padX}px`,
      background: bg, color: fg,
      borderRadius: 999, fontSize: fs, fontWeight: 600,
      letterSpacing: 0.2,
      ...style,
    }}>{children}</span>
  );
};

// Button
const Button = ({ children, variant = "primary", theme, size = "md", style, onClick, icon }) => {
  const base = {
    border: 0, cursor: "pointer", fontWeight: 600,
    borderRadius: size === "sm" ? 10 : 12,
    padding: size === "sm" ? "8px 14px" : size === "lg" ? "14px 22px" : "11px 18px",
    fontSize: size === "sm" ? 13 : 14,
    display: "inline-flex", alignItems: "center", justifyContent: "center", gap: 8,
    fontFamily: "inherit", letterSpacing: 0,
    transition: "transform .08s, background .15s, color .15s",
  };
  const variants = {
    primary: { background: theme.accent, color: theme.accentInk },
    ghost:   { background: "transparent", color: theme.ink, boxShadow: `inset 0 0 0 1px ${theme.line}` },
    link:    { background: "transparent", color: theme.accent, padding: 0 },
    solid:   { background: theme.ink, color: theme.surface },
  };
  return (
    <button onClick={onClick} style={{ ...base, ...variants[variant], ...style }}
      onMouseDown={(e) => (e.currentTarget.style.transform = "scale(.98)")}
      onMouseUp={(e) => (e.currentTarget.style.transform = "")}
      onMouseLeave={(e) => (e.currentTarget.style.transform = "")}>
      {icon && <Icon name={icon} size={16} />}
      {children}
    </button>
  );
};

      color: accent ? theme.accent : theme.ink,
      letterSpacing: -1, fontWeight: 500,
      fontVariantNumeric: "tabular-nums",
    }}>{value}</div>
    {sub && <div style={{ fontSize: 12, color: theme.muted, marginTop: 6, display: "flex", alignItems: "center", gap: 5 }}>
      {trend && <Icon name={trend === "up" ? "up" : "down"} size={12} style={{ color: trend === "up" ? theme.ok : theme.danger }} />}
      {sub}
    </div>}
  </div>
);

// Placeholder tile (for imagery we don't have)
const Placeholder = ({ label = "photo", theme, height = 140, style }) => (
  <div style={{
    height, borderRadius: 12,
    background: `repeating-linear-gradient(135deg, ${theme.surface2}, ${theme.surface2} 6px, ${theme.bg} 6px, ${theme.bg} 12px)`,
    border: `1px solid ${theme.line}`,
    display: "flex", alignItems: "center", justifyContent: "center",
    fontFamily: window.d2dTokens.font.mono, fontSize: 11,
    color: theme.muted, textTransform: "uppercase", letterSpacing: 2,
    ...style,
  }}>{label}</div>
);

// Section label (the small uppercase divider)
const Eyebrow = ({ children, theme, style }) => (
  <div style={{
    fontFamily: window.d2dTokens.font.mono,
    fontSize: 10, letterSpacing: 2.5,
    color: theme.muted, textTransform: "uppercase", fontWeight: 600,
    ...style,
  }}>{children}</div>
);

// Sparkbar — pure bars
const SparkBars = ({ data, theme, color, height = 32 }) => {
  const max = Math.max(...data, 1);
  return (
    <div style={{ display: "flex", alignItems: "flex-end", gap: 3, height }}>
      {data.map((v, i) => (
        <div key={i} style={{
          width: 6, height: `${(v/max)*100}%`, minHeight: 2,
          background: color || theme.accent,
          borderRadius: 2, opacity: 0.5 + (v/max)*0.5,
        }} />
      ))}
    </div>
  );
};

// Progress ring
const Ring = ({ value = 70, size = 48, stroke = 4, theme, color, children }) => {
  const r = (size - stroke) / 2;
  const c = 2 * Math.PI * r;
  return (
    <div style={{ position: "relative", width: size, height: size }}>
      <svg width={size} height={size}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={theme.line} strokeWidth={stroke}/>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color || theme.accent}
          strokeWidth={stroke} strokeDasharray={c} strokeDashoffset={c*(1-value/100)}
          transform={`rotate(-90 ${size/2} ${size/2})`} strokeLinecap="round"/>
      </svg>
      <div style={{ position: "absolute", inset: 0, display: "flex", alignItems: "center", justifyContent: "center", fontFamily: window.d2dTokens.font.mono, fontSize: 11, fontWeight: 600, color: theme.ink }}>
        {children ?? `${value}`}
      </div>
    </div>
  );
};

// Logo — the D2D mark we'll use across surfaces
const Logo = ({ size = 22, theme, style, horizontal = true }) => (
  <span style={{ display: "inline-flex", alignItems: "center", gap: 10, ...style }}>
    <svg width={size} height={size} viewBox="0 0 32 32">
      <rect x="1" y="1" width="30" height="30" rx="6" fill={theme.ink}/>
      <path d="M9 9h6c4 0 7 3 7 7s-3 7-7 7H9z" fill="none" stroke={theme.accent} strokeWidth="2.4"/>
      <circle cx="22" cy="9.5" r="1.6" fill={theme.accent}/>
    </svg>
    {horizontal && <span style={{
      fontFamily: window.d2dTokens.font.display,
      fontSize: size * 0.85, color: theme.ink, letterSpacing: -0.3,
      fontWeight: 500,
    }}>D2D</span>}
  </span>
);

Object.assign(window, { Icon, Pill, Button, Card, Stat, Placeholder, Eyebrow, SparkBars, Ring, Logo });

</script>
<script type="text/babel">
/* ===== shared/ios-frame.jsx ===== */

// iOS.jsx — Simplified iOS 26 (Liquid Glass) device frame
// Based on the iOS 26 UI Kit + Figma status bar spec. No assets, no deps.
// Exports: IOSDevice, IOSStatusBar, IOSNavBar, IOSGlassPill, IOSList, IOSListRow, IOSKeyboard

// ─────────────────────────────────────────────────────────────
// Status bar
// ─────────────────────────────────────────────────────────────
function IOSStatusBar({ dark = false, time = '9:41' }) {
  const c = dark ? '#fff' : '#000';
  return (
    <div style={{
      display: 'flex', gap: 154, alignItems: 'center', justifyContent: 'center',
      padding: '21px 24px 19px', boxSizing: 'border-box',
      position: 'relative', zIndex: 20, width: '100%',
    }}>
      <div style={{ flex: 1, height: 22, display: 'flex', alignItems: 'center', justifyContent: 'center', paddingTop: 1.5 }}>
        <span style={{
          fontFamily: '-apple-system, "SF Pro", system-ui', fontWeight: 590,
          fontSize: 17, lineHeight: '22px', color: c,
        }}>{time}</span>
      </div>
      <div style={{ flex: 1, height: 22, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 7, paddingTop: 1, paddingRight: 1 }}>
        <svg width="19" height="12" viewBox="0 0 19 12">
          <rect x="0" y="7.5" width="3.2" height="4.5" rx="0.7" fill={c}/>
          <rect x="4.8" y="5" width="3.2" height="7" rx="0.7" fill={c}/>
          <rect x="9.6" y="2.5" width="3.2" height="9.5" rx="0.7" fill={c}/>
          <rect x="14.4" y="0" width="3.2" height="12" rx="0.7" fill={c}/>
        </svg>
        <svg width="17" height="12" viewBox="0 0 17 12">
          <path d="M8.5 3.2C10.8 3.2 12.9 4.1 14.4 5.6L15.5 4.5C13.7 2.7 11.2 1.5 8.5 1.5C5.8 1.5 3.3 2.7 1.5 4.5L2.6 5.6C4.1 4.1 6.2 3.2 8.5 3.2Z" fill={c}/>
          <path d="M8.5 6.8C9.9 6.8 11.1 7.3 12 8.2L13.1 7.1C11.8 5.9 10.2 5.1 8.5 5.1C6.8 5.1 5.2 5.9 3.9 7.1L5 8.2C5.9 7.3 7.1 6.8 8.5 6.8Z" fill={c}/>
          <circle cx="8.5" cy="10.5" r="1.5" fill={c}/>
        </svg>
        <svg width="27" height="13" viewBox="0 0 27 13">
          <rect x="0.5" y="0.5" width="23" height="12" rx="3.5" stroke={c} strokeOpacity="0.35" fill="none"/>
          <rect x="2" y="2" width="20" height="9" rx="2" fill={c}/>
          <path d="M25 4.5V8.5C25.8 8.2 26.5 7.2 26.5 6.5C26.5 5.8 25.8 4.8 25 4.5Z" fill={c} fillOpacity="0.4"/>
        </svg>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Liquid glass pill — blur + tint + shine
// ─────────────────────────────────────────────────────────────
function IOSGlassPill({ children, dark = false, style = {} }) {
  return (
    <div style={{
      height: 44, minWidth: 44, borderRadius: 9999,
      position: 'relative', overflow: 'hidden',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      boxShadow: dark
        ? '0 2px 6px rgba(0,0,0,0.35), 0 6px 16px rgba(0,0,0,0.2)'
        : '0 1px 3px rgba(0,0,0,0.07), 0 3px 10px rgba(0,0,0,0.06)',
      ...style,
    }}>
      {/* blur + tint */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 9999,
        backdropFilter: 'blur(12px) saturate(180%)',
        WebkitBackdropFilter: 'blur(12px) saturate(180%)',
        background: dark ? 'rgba(120,120,128,0.28)' : 'rgba(255,255,255,0.5)',
      }} />
      {/* shine */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 9999,
        boxShadow: dark
          ? 'inset 1.5px 1.5px 1px rgba(255,255,255,0.15), inset -1px -1px 1px rgba(255,255,255,0.08)'
          : 'inset 1.5px 1.5px 1px rgba(255,255,255,0.7), inset -1px -1px 1px rgba(255,255,255,0.4)',
        border: dark ? '0.5px solid rgba(255,255,255,0.15)' : '0.5px solid rgba(0,0,0,0.06)',
      }} />
      <div style={{ position: 'relative', zIndex: 1, display: 'flex', alignItems: 'center', padding: '0 4px' }}>
        {children}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Navigation bar — glass pills + large title
// ─────────────────────────────────────────────────────────────
function IOSNavBar({ title = 'Title', dark = false, trailingIcon = true }) {
  const muted = dark ? 'rgba(255,255,255,0.6)' : '#404040';
  const text = dark ? '#fff' : '#000';
  const pillIcon = (content) => (
    <IOSGlassPill dark={dark}>
      <div style={{ width: 36, height: 36, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        {content}
      </div>
    </IOSGlassPill>
  );
  return (
    <div style={{
      display: 'flex', flexDirection: 'column', gap: 10,
      paddingTop: 62, paddingBottom: 10, position: 'relative', zIndex: 5,
    }}>
      <div style={{
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        padding: '0 16px',
      }}>
        {/* back chevron */}
        {pillIcon(
          <svg width="12" height="20" viewBox="0 0 12 20" fill="none" style={{ marginLeft: -1 }}>
            <path d="M10 2L2 10l8 8" stroke={muted} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
        )}
        {/* trailing ellipsis */}
        {trailingIcon && pillIcon(
          <svg width="22" height="6" viewBox="0 0 22 6">
            <circle cx="3" cy="3" r="2.5" fill={muted}/>
            <circle cx="11" cy="3" r="2.5" fill={muted}/>
            <circle cx="19" cy="3" r="2.5" fill={muted}/>
          </svg>
        )}
      </div>
      {/* large title */}
      <div style={{
        padding: '0 16px',
        fontFamily: '-apple-system, system-ui',
        fontSize: 34, fontWeight: 700, lineHeight: '41px',
        color: text, letterSpacing: 0.4,
      }}>{title}</div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Grouped list (inset card, r:26) + row (52px)
// ─────────────────────────────────────────────────────────────
function IOSListRow({ title, detail, icon, chevron = true, isLast = false, dark = false }) {
  const text = dark ? '#fff' : '#000';
  const sec = dark ? 'rgba(235,235,245,0.6)' : 'rgba(60,60,67,0.6)';
  const ter = dark ? 'rgba(235,235,245,0.3)' : 'rgba(60,60,67,0.3)';
  const sep = dark ? 'rgba(84,84,88,0.65)' : 'rgba(60,60,67,0.12)';
  return (
    <div style={{
      display: 'flex', alignItems: 'center', minHeight: 52,
      padding: '0 16px', position: 'relative',
      fontFamily: '-apple-system, system-ui', fontSize: 17,
      letterSpacing: -0.43,
    }}>
      {icon && (
        <div style={{
          width: 30, height: 30, borderRadius: 7, background: icon,
          marginRight: 12, flexShrink: 0,
        }} />
      )}
      <div style={{ flex: 1, color: text }}>{title}</div>
      {detail && <span style={{ color: sec, marginRight: 6 }}>{detail}</span>}
      {chevron && (
        <svg width="8" height="14" viewBox="0 0 8 14" style={{ flexShrink: 0 }}>
          <path d="M1 1l6 6-6 6" stroke={ter} strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
      )}
      {!isLast && (
        <div style={{
          position: 'absolute', bottom: 0, right: 0,
          left: icon ? 58 : 16, height: 0.5, background: sep,
        }} />
      )}
    </div>
  );
}

function IOSList({ header, children, dark = false }) {
  const hc = dark ? 'rgba(235,235,245,0.6)' : 'rgba(60,60,67,0.6)';
  const bg = dark ? '#1C1C1E' : '#fff';
  return (
    <div>
      {header && (
        <div style={{
          fontFamily: '-apple-system, system-ui', fontSize: 13,
          color: hc, textTransform: 'uppercase',
          padding: '8px 36px 6px', letterSpacing: -0.08,
        }}>{header}</div>
      )}
      <div style={{
        background: bg, borderRadius: 26,
        margin: '0 16px', overflow: 'hidden',
      }}>{children}</div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Device frame
// ─────────────────────────────────────────────────────────────
function IOSDevice({
  children, width = 402, height = 874, dark = false,
  title, keyboard = false,
}) {
  return (
    <div style={{
      width, height, borderRadius: 48, overflow: 'hidden',
      position: 'relative', background: dark ? '#000' : '#F2F2F7',
      boxShadow: '0 40px 80px rgba(0,0,0,0.18), 0 0 0 1px rgba(0,0,0,0.12)',
      fontFamily: '-apple-system, system-ui, sans-serif',
      WebkitFontSmoothing: 'antialiased',
    }}>
      {/* dynamic island */}
      <div style={{
        position: 'absolute', top: 11, left: '50%', transform: 'translateX(-50%)',
        width: 126, height: 37, borderRadius: 24, background: '#000', zIndex: 50,
      }} />
      {/* status bar (absolute) */}
      <div style={{ position: 'absolute', top: 0, left: 0, right: 0, zIndex: 10 }}>
        <IOSStatusBar dark={dark} />
      </div>
      {/* nav + content */}
      <div style={{ height: '100%', display: 'flex', flexDirection: 'column' }}>
        {title !== undefined && <IOSNavBar title={title} dark={dark} />}
        <div style={{ flex: 1, overflow: 'auto' }}>{children}</div>
        {keyboard && <IOSKeyboard dark={dark} />}
      </div>
      {/* home indicator — always on top */}
      <div style={{
        position: 'absolute', bottom: 0, left: 0, right: 0, zIndex: 60,
        height: 34, display: 'flex', justifyContent: 'center', alignItems: 'flex-end',
        paddingBottom: 8, pointerEvents: 'none',
      }}>
        <div style={{
          width: 139, height: 5, borderRadius: 100,
          background: dark ? 'rgba(255,255,255,0.7)' : 'rgba(0,0,0,0.25)',
        }} />
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Keyboard — iOS 26 liquid glass
// ─────────────────────────────────────────────────────────────
function IOSKeyboard({ dark = false }) {
  const glyph = dark ? 'rgba(255,255,255,0.7)' : '#595959';
  const sugg = dark ? 'rgba(255,255,255,0.6)' : '#333';
  const keyBg = dark ? 'rgba(255,255,255,0.22)' : 'rgba(255,255,255,0.85)';

  // special-key icons
  const icons = {
    shift: <svg width="19" height="17" viewBox="0 0 19 17"><path d="M9.5 1L1 9.5h4.5V16h8V9.5H18L9.5 1z" fill={glyph}/></svg>,
    del: <svg width="23" height="17" viewBox="0 0 23 17"><path d="M7 1h13a2 2 0 012 2v11a2 2 0 01-2 2H7l-6-7.5L7 1z" fill="none" stroke={glyph} strokeWidth="1.6" strokeLinejoin="round"/><path d="M10 5l7 7M17 5l-7 7" stroke={glyph} strokeWidth="1.6" strokeLinecap="round"/></svg>,
    ret: <svg width="20" height="14" viewBox="0 0 20 14"><path d="M18 1v6H4m0 0l4-4M4 7l4 4" fill="none" stroke="#fff" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>,
  };

  const key = (content, { w, flex, ret, fs = 25, k } = {}) => (
    <div key={k} style={{
      height: 42, borderRadius: 8.5,
      flex: flex ? 1 : undefined, width: w, minWidth: 0,
      background: ret ? '#08f' : keyBg,
      boxShadow: '0 1px 0 rgba(0,0,0,0.075)',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      fontFamily: '-apple-system, "SF Compact", system-ui',
      fontSize: fs, fontWeight: 458, color: ret ? '#fff' : glyph,
    }}>{content}</div>
  );

  const row = (keys, pad = 0) => (
    <div style={{ display: 'flex', gap: 6.5, justifyContent: 'center', padding: `0 ${pad}px` }}>
      {keys.map(l => key(l, { flex: true, k: l }))}
    </div>
  );

  return (
    <div style={{
      position: 'relative', zIndex: 15, borderRadius: 27, overflow: 'hidden',
      padding: '11px 0 2px',
      display: 'flex', flexDirection: 'column', alignItems: 'center',
      boxShadow: dark
        ? '0 -2px 20px rgba(0,0,0,0.09)'
        : '0 -1px 6px rgba(0,0,0,0.018), 0 -3px 20px rgba(0,0,0,0.012)',
    }}>
      {/* liquid glass bg — same recipe as nav pills */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 27,
        backdropFilter: 'blur(12px) saturate(180%)',
        WebkitBackdropFilter: 'blur(12px) saturate(180%)',
        background: dark ? 'rgba(120,120,128,0.14)' : 'rgba(255,255,255,0.25)',
      }} />
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 27,
        boxShadow: dark
          ? 'inset 1.5px 1.5px 1px rgba(255,255,255,0.15)'
          : 'inset 1.5px 1.5px 1px rgba(255,255,255,0.7), inset -1px -1px 1px rgba(255,255,255,0.4)',
        border: dark ? '0.5px solid rgba(255,255,255,0.15)' : '0.5px solid rgba(0,0,0,0.06)',
        pointerEvents: 'none',
      }} />

      {/* autocorrect bar */}
      <div style={{
        display: 'flex', gap: 20, alignItems: 'center',
        padding: '8px 22px 13px', width: '100%', boxSizing: 'border-box',
        position: 'relative',
      }}>
        {['"The"', 'the', 'to'].map((w, i) => (
          <React.Fragment key={i}>
            {i > 0 && <div style={{ width: 1, height: 25, background: '#ccc', opacity: 0.3 }} />}
            <div style={{
              flex: 1, textAlign: 'center',
              fontFamily: '-apple-system, system-ui', fontSize: 17,
              color: sugg, letterSpacing: -0.43, lineHeight: '22px',
            }}>{w}</div>
          </React.Fragment>
        ))}
      </div>

      {/* key layout */}
      <div style={{
        display: 'flex', flexDirection: 'column', gap: 13,
        padding: '0 6.5px', width: '100%', boxSizing: 'border-box',
        position: 'relative',
      }}>
        {row(['q','w','e','r','t','y','u','i','o','p'])}
        {row(['a','s','d','f','g','h','j','k','l'], 20)}
        <div style={{ display: 'flex', gap: 14.25, alignItems: 'center' }}>
          {key(icons.shift, { w: 45, k: 'shift' })}
          <div style={{ display: 'flex', gap: 6.5, flex: 1 }}>
            {['z','x','c','v','b','n','m'].map(l => key(l, { flex: true, k: l }))}
          </div>
          {key(icons.del, { w: 45, k: 'del' })}
        </div>
        <div style={{ display: 'flex', gap: 6, alignItems: 'center' }}>
          {key('ABC', { w: 92.25, fs: 18, k: 'abc' })}
          {key('', { flex: true, k: 'space' })}
          {key(icons.ret, { w: 92.25, ret: true, k: 'ret' })}
        </div>
      </div>

      {/* bottom spacer (emoji+mic area, icons omitted) */}
      <div style={{ height: 56, width: '100%', position: 'relative' }} />
    </div>
  );
}

Object.assign(window, {
  IOSDevice, IOSStatusBar, IOSNavBar, IOSGlassPill, IOSList, IOSListRow, IOSKeyboard,
});

</script>
<script type="text/babel">
/* ===== shared/agent-detail.jsx ===== */
// Slide-in drawer that reveals full agent metadata on click.
// Driven by window.AGENT_CATALOG (PDF-faithful). Bharat Bold styling.

function AgentDetail({ agentKey, theme, onClose }) {
  const t = theme;
  const data = agentKey ? window.AGENT_CATALOG?.[agentKey] : null;

  React.useEffect(() => {
    if (!agentKey) return;
    const onKey = (e) => { if (e.key === "Escape") onClose(); };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [agentKey, onClose]);

  if (!agentKey) return null;

  const mono = "'Geist Mono', monospace";
  const serif = "'Instrument Serif', serif";

  // phase color lookup
  const phaseColor = (() => {
    const p = (window.AGENT_PHASES || []).find(x => x.key === data?.phase);
    return p?.color || t.accent;
  })();

  const Section = ({ label, count, children }) => (
    <div style={{ marginBottom: 26 }}>
      <div style={{ display: "flex", alignItems: "baseline", gap: 8, marginBottom: 10 }}>
        <div style={{ fontFamily: mono, fontSize: 10, letterSpacing: 2, color: t.accent, textTransform: "uppercase", fontWeight: 700 }}>
          {label}
        </div>
        {count != null && (
          <div style={{ fontFamily: mono, fontSize: 10, color: t.muted, fontWeight: 700 }}>· {count}</div>
        )}
      </div>
      {children}
    </div>
  );

  const Pill = ({ children, color, bg }) => (
    <span style={{
      display: "inline-block",
      padding: "4px 10px",
      borderRadius: 999,
      border: `1px solid ${color || t.line}`,
      background: bg || "transparent",
      color: color || t.ink2,
      fontFamily: mono,
      fontSize: 10,
      letterSpacing: 1,
      textTransform: "uppercase",
      fontWeight: 700,
      marginRight: 6,
      marginBottom: 6,
    }}>{children}</span>
  );

  const Bullet = ({ children, color }) => (
    <div style={{ display: "flex", gap: 10, marginBottom: 8, lineHeight: 1.5, fontSize: 13, color: t.ink }}>
      <span style={{ color: color || t.accent, fontFamily: mono, fontSize: 11, marginTop: 2 }}>◆</span>
      <span style={{ flex: 1 }}>{children}</span>
    </div>
  );

  const fallback = {
    phase: "—", role: "—", mission: "Metadata not yet authored.",
    reportsTo: "—", handsOffTo: [], jobDescription: [],
    inputs: "—", outputs: "—", kras: [], flowLogic: "—",
    whatCanGoWrong: [], tools: [], modelTier: "—", sla: "—", example: null,
  };
  const d = { ...fallback, ...(data || {}) };

  return (
    <div
      onClick={onClose}
      style={{
        position: "fixed", inset: 0, zIndex: 1000,
        background: "rgba(15, 13, 8, 0.55)",
        animation: "fadeIn 0.18s ease-out",
      }}
    >
      <div
        onClick={(e) => e.stopPropagation()}
        style={{
          position: "absolute", top: 0, right: 0, bottom: 0,
          width: "min(720px, 94vw)",
          background: t.bg,
          borderLeft: `1px solid ${t.line}`,
          overflowY: "auto",
          animation: "slideInR 0.24s cubic-bezier(0.22, 1, 0.36, 1)",
          padding: "28px 32px 56px",
        }}
      >
        {/* Header */}
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 8 }}>
          <Pill color={phaseColor}>{d.phase}</Pill>
          <button
            onClick={onClose}
            aria-label="Close"
            style={{
              background: "transparent", border: `1px solid ${t.line}`, color: t.ink,
              fontFamily: mono, fontSize: 11, letterSpacing: 1, padding: "6px 10px",
              borderRadius: 6, cursor: "pointer",

    return () => io.disconnect();
  }, []);

          <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
            {Object.entries(AGENTS).filter(([k, a], idx, arr) =>
              arr.findIndex(([, b]) => b.n === a.n) === idx   // dedupe Mentor + Motivator into one row
            ).map(([k, a]) => {
              const keysForName = Object.keys(AGENTS).filter(kk => AGENTS[kk].n === a.n);
              const active = phases[activePhase]?.events.some(e => keysForName.includes(e.a));
              const isDeploy = a.phase === "DEPLOY";
              return (
                <div
                  key={k}
                  role="button"
                  tabIndex={0}
                  onClick={() => setOpenAgent(a.catalogKey)}
                  onKeyDown={(e) => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); setOpenAgent(a.catalogKey); } }}
                  style={{
                    padding: "8px 10px", borderRadius: 8, display: "flex", alignItems: "center", gap: 8,
                    background: active ? `color-mix(in oklch, ${a.c} 12%, ${theme.surface})` : "transparent",

                    transition: "all .15s",
                    cursor: "pointer",
                    position: "relative",
                  }}
                  onMouseEnter={(e) => { if (!active) e.currentTarget.style.background = theme.surface; }}
                  onMouseLeave={(e) => { if (!active) e.currentTarget.style.background = "transparent"; }}
                >
                  <span style={{ width: 8, height: 8, borderRadius: 4, background: a.c, flexShrink: 0, animation: active ? "pulse 1.2s infinite" : "none" }}/>

          {phases.map((p, i) => {

            return (
              <div key={p.id} ref={(el) => refs.current[i] = el} data-idx={i} style={{ marginBottom: 36, scrollMarginTop: 160 }}>

                <div style={{ display: "flex", alignItems: "baseline", gap: 14, marginBottom: 10 }}>
                  <div style={{ fontFamily: "'Geist Mono', monospace", fontSize: 11, color: theme.muted, letterSpacing: 1.5, textTransform: "uppercase", fontWeight: 700, whiteSpace: "nowrap" }}>{p.when}</div>
                  <div style={{ flex: 1, height: 1, background: theme.line2 }}/>
                  <div style={{ fontFamily: "'Geist Mono', monospace", fontSize: 10, color: theme.accent, fontWeight: 700, letterSpacing: 1.5, whiteSpace: "nowrap" }}>+${pt.cost.toFixed(3)} · {pt.calls} calls</div>
                </div>
                <div style={{ fontFamily: "'Instrument Serif', serif", fontSize: 30, letterSpacing: -0.6, lineHeight: 1.15, marginBottom: 14 }}>{p.title}</div>

                {/* Event stream */}
                <div style={{ padding: "14px 14px 10px", background: "#E4DDD1", borderRadius: 14, display: "flex", flexDirection: "column", gap: 6 }}>
                  {p.events.map((e, j) => <EventRow key={j} e={e} t={theme} AGENTS={AGENTS}/>)}
                </div>

                {/* Dashboard renders (if present) */}
                {p.dashboard === "tech" && <TechTrack theme={theme} AGENTS={AGENTS}/>}
                {p.dashboard === "domain" && <LearnerDay1 theme={theme} AGENTS={AGENTS}/>}
                {p.dashboard === "drill" && <MentorDrill theme={theme} AGENTS={AGENTS}/>}

                {p.dashboard === "tasks" && <CandidateTasks theme={theme} AGENTS={AGENTS}/>}
              </div>

          })}

          {/* End card */}
          <div style={{ padding: 28, background: theme.ink, color: "#fff", borderRadius: 16, marginTop: 24 }}>
            <div style={{ fontFamily: "'Geist Mono', monospace", fontSize: 10, letterSpacing: 2.5, color: theme.accent, textTransform: "uppercase", fontWeight: 700 }}>Journey complete · 30 days · BUILD → DEPLOY</div>
            <div style={{ fontFamily: "'Instrument Serif', serif", fontSize: 42, letterSpacing: -1, lineHeight: 1.05, marginTop: 10 }}>
              Priya costs D2D <em style={{ color: theme.accent }}>${totalCost.toFixed(2)}</em> in agent calls<br/>to turn her from lead → L2 consultant.
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 0, marginTop: 24, borderTop: "1px solid rgba(255,255,255,0.1)", paddingTop: 20 }}>
              {[
                { k: "Total API cost",  v: `$${totalCost.toFixed(2)}`, s: "~₹60 at current FX" },
                { k: "Agent calls",     v: String(totalCalls),        s: "across BUILD + DEPLOY agents, 30 days" },
                { k: "Client fee",      v: "₹25,000",                 s: "paid only on placement" },
              ].map((m, i) => (
                <div key={i} style={{ paddingLeft: i > 0 ? 20 : 0, borderLeft: i > 0 ? "1px solid rgba(255,255,255,0.1)" : "none" }}>
                  <div style={{ fontSize: 10, fontFamily: "'Geist Mono', monospace", letterSpacing: 2, color: "rgba(255,255,255,0.5)", fontWeight: 700, textTransform: "uppercase" }}>{m.k}</div>

                  <div style={{ fontSize: 11, color: "rgba(255,255,255,0.55)", marginTop: 4 }}>{m.s}</div>

            </div>

        </div>

        {/* RIGHT — sticky cost-per-agent breakdown */}
        <div style={{ position: "sticky", top: 140 }}>
          <CostBreakdown phases={phases} activeIdx={activePhase} AGENTS={AGENTS} theme={theme}/>

      <AgentDetail agentKey={openAgent} theme={theme} onClose={() => setOpenAgent(null)} />

}

// ─── Single event row in a WhatsApp-looking frame ───
function EventRow({ e, t, AGENTS }) {
  const a = AGENTS[e.a];

  if (e.kind === "sys") {
    return (
      <div style={{ alignSelf: "center", maxWidth: "90%", padding: "6px 11px", background: "rgba(0,0,0,0.05)", borderRadius: 8, fontSize: 11.5, color: t.ink2, fontFamily: "'Geist Mono', monospace", letterSpacing: 0.1, textAlign: "center" }}>
        <span style={{ color: a.c, fontWeight: 700 }}>⚙ {a.n}</span> · {e.msg}{e.verified && <span style={{ color: t.ok, marginLeft: 6 }}>✓</span>}
      </div>
    );
  }
  if (e.kind === "push") {
    return (
      <div style={{ padding: 12, background: "#fff", borderRadius: 10, borderLeft: `3px solid ${a.c}`, boxShadow: "0 1px 2px rgba(0,0,0,0.04)" }}>
        <div style={{ fontSize: 9, fontFamily: "'Geist Mono', monospace", letterSpacing: 1.5, color: a.c, fontWeight: 700, textTransform: "uppercase" }}>📲 Push · {a.n}</div>
        <div style={{ fontSize: 13.5, fontWeight: 600, color: t.ink, marginTop: 3 }}>{e.title}</div>
        <div style={{ fontSize: 12.5, color: t.ink2, marginTop: 2, lineHeight: 1.4 }}>{e.msg}</div>
      </div>
    );
  }
  // WA message
  const mine = e.from === "you";
  return (
    <div style={{ display: "flex", justifyContent: mine ? "flex-end" : "flex-start" }}>
      <div style={{ maxWidth: "85%" }}>
        {!mine && <div style={{ fontSize: 9, fontFamily: "'Geist Mono', monospace", letterSpacing: 1, color: a.c, fontWeight: 700, textTransform: "uppercase", marginBottom: 2, marginLeft: 3 }}>● {a.n}</div>}
        <div style={{ padding: "7px 11px 5px", borderRadius: mine ? "12px 12px 2px 12px" : "12px 12px 12px 2px", background: mine ? "#DCF8C6" : "#fff", fontSize: 13, lineHeight: 1.4, color: t.ink, fontFamily: window.d2dTokens.font.deva, boxShadow: "0 1px 1px rgba(0,0,0,0.06)" }}>
          {e.msg}
          {e.score != null && <span style={{ display: "inline-block", marginLeft: 6, padding: "1px 6px", borderRadius: 4, background: e.score >= 70 ? t.ok : e.score >= 40 ? t.warn : t.danger, color: "#fff", fontSize: 10, fontFamily: "'Geist Mono', monospace", fontWeight: 700, verticalAlign: 2 }}>+{e.score}</span>}
        </div>
      </div>
    </div>
  );
}

// ─── Right-rail: per-agent stacked bar of cost, up to the currently-visible phase ───
function CostBreakdown({ phases, activeIdx, AGENTS, theme }) {
  const upto = phases.slice(0, activeIdx + 1);
  const byAgent = {};
  upto.forEach(p => p.events.forEach(e => {
    if (!e.calls) return;
    byAgent[e.a] = (byAgent[e.a] || 0) + e.calls * AGENTS[e.a].cost;
  }));
  const rows = Object.entries(byAgent).map(([k, c]) => ({ k, c, a: AGENTS[k] })).sort((a, b) => b.c - a.c);
  const total = rows.reduce((a, r) => a + r.c, 0);

  return (
    <div style={{ padding: 18, background: theme.surface, border: `1px solid ${theme.line}`, borderRadius: 14 }}>
      <div style={{ fontFamily: "'Geist Mono', monospace", fontSize: 10, letterSpacing: 2, color: theme.muted, textTransform: "uppercase", fontWeight: 700 }}>Cost breakdown · to phase {activeIdx + 1}</div>
      <div style={{ fontFamily: "'Instrument Serif', serif", fontSize: 38, letterSpacing: -1, lineHeight: 1, marginTop: 8, color: theme.ink }}>${total.toFixed(3)}</div>
      <div style={{ fontSize: 11, color: theme.muted, marginTop: 2, fontFamily: "'Geist Mono', monospace" }}>Running · {phases[activeIdx]?.title}</div>

      {/* stacked bar */}
      <div style={{ display: "flex", height: 8, marginTop: 14, borderRadius: 4, overflow: "hidden", background: theme.surface2 }}>

                  </div>

            <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
              {c.references.map((r, i) => (
                <div key={i} style={{ padding: 14, background: t.surface, borderRadius: 10, borderLeft: `3px solid ${t.accent}` }}>
                  <div style={{ fontSize: 14, color: t.ink, lineHeight: 1.5, fontStyle: "italic" }}>"{r.quote}"</div>

                { k: "Gate 3", v: c.bootcamp.gate3, max: 300 },
                { k: "Projects", v: c.bootcamp.projects, max: null, sub: "submitted" },
              ].map((m, i) => (
                <div key={i} style={{ padding: 12, background: t.surface, border: `1px solid ${t.line}`, borderRadius: 10 }}>
                  <div style={{ fontSize: 10, fontFamily: "'Geist Mono', monospace", letterSpacing: 1.5, color: t.muted, textTransform: "uppercase", fontWeight: 700 }}>{m.k}</div>

          </SectionH>

          {/* Availability + rate */}
          <SectionH t={t} label="Engagement terms">
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
              <div style={{ padding: 14, background: t.surface, border: `1px solid ${t.line}`, borderRadius: 10 }}>

              </div>
              <div style={{ padding: 14, background: t.ink, color: "#fff", borderRadius: 10 }}>
                <div style={{ fontSize: 10, fontFamily: "'Geist Mono', monospace", letterSpacing: 1.5, color: t.accent, textTransform: "uppercase", fontWeight: 700 }}>Rate</div>
                <div style={{ fontFamily: "'Instrument Serif', serif", fontSize: 24, marginTop: 4, letterSpacing: -0.5 }}>{c.rate}</div>

            <button onClick={onPick} style={{ padding: "11px 22px", background: t.accent, color: t.accentInk, border: 0, borderRadius: 10, cursor: "pointer", fontFamily: "inherit", fontSize: 14, fontWeight: 700 }}>Confirm {c.n.split(" ")[0]} →</button>
          </div>
        </div>
      </div>
    </div>

function SectionH({ t, label, children }) {
  return (
    <div style={{ marginBottom: 28 }}>
      <div style={{ fontSize: 10, fontFamily: "'Geist Mono', monospace", letterSpacing: 2.5, color: t.muted, textTransform: "uppercase", fontWeight: 700, marginBottom: 12 }}>{label}</div>
      {children}
    </div>
  );
}

function ClientDash({ t, state, onAgent }) {
  const [tab, setTab] = React.useState("overview"); // overview | tasks
  const [tasks, setTasks] = React.useState(window.d2dTasks.tasks);
  const [openTask, setOpenTask] = React.useState(null);

  const counts = {
    approved: tasks.filter(x => x.status === "approved").length,
    in_progress: tasks.filter(x => x.status === "in_progress").length,
    submitted: tasks.filter(x => x.status === "submitted").length,
    flagged: tasks.filter(x => x.status === "flagged").length,
    assigned: tasks.filter(x => x.status === "assigned").length,
  };
  const needsAttention = counts.submitted + counts.flagged;

  const update = (id, patch) => setTasks(ts => ts.map(x => x.id === id ? { ...x, ...patch } : x));

  return (
    <div style={{ animation: "fadeUp .3s" }}>
      {/* Consultant card */}
      <div style={{ padding: 20, borderRadius: 14, background: t.surface, border: `1px solid ${t.line}`, display: "flex", alignItems: "center", gap: 16, marginBottom: 18 }}>
        <div style={{ width: 56, height: 56, borderRadius: 28, background: t.accent, color: t.accentInk, display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "'Instrument Serif', serif", fontSize: 26 }}>{state.clientMatched.n[0]}</div>
        <div style={{ flex: 1 }}>
          <div style={{ fontSize: 11, fontFamily: "'Geist Mono', monospace", color: t.muted, textTransform: "uppercase", letterSpacing: 1.5, fontWeight: 700 }}>Your consultant · Week {state.clientWeek}</div>
          <div style={{ fontFamily: "'Instrument Serif', serif", fontSize: 26, letterSpacing: -0.5, marginTop: 2 }}>{state.clientMatched.n}</div>
          <div style={{ fontSize: 12, color: t.ink2, marginTop: 2 }}>{state.clientMatched.city} · D2D Rank {state.clientMatched.rank} · {state.clientMatched.score}</div>
        </div>
        <button style={{ padding: "10px 16px", background: t.ink, color: "#fff", border: 0, borderRadius: 10, cursor: "pointer", fontFamily: "inherit", fontSize: 13, fontWeight: 600 }}>
          <Icon name="wa" size={14} style={{ marginRight: 6, verticalAlign: -2 }}/>WhatsApp {state.clientMatched.n.split(" ")[0]}
        </button>
      </div>

      {/* Tabs */}
      <div style={{ display: "flex", gap: 4, marginBottom: 20, borderBottom: `1px solid ${t.line}` }}>
        {[
          { id: "overview", label: "Platform", hint: "30-day plan + outcomes" },
          { id: "whatsapp", label: "WhatsApp", hint: "quick chat · Client Concierge" },
          { id: "tasks", label: `Tasks`, hint: `${tasks.length} total`, badge: needsAttention },
        ].map(x => {
          const active = tab === x.id;
          return (
            <button key={x.id} onClick={() => setTab(x.id)} style={{
              padding: "12px 18px", background: "transparent",
              border: 0, borderBottom: `2px solid ${active ? t.accent : "transparent"}`,
              marginBottom: -1, cursor: "pointer", fontFamily: "inherit",
              color: active ? t.ink : t.muted, fontSize: 14, fontWeight: 600,
              display: "flex", alignItems: "center", gap: 8,
            }}>
              {x.label}
              <span style={{ fontSize: 11, color: t.muted, fontWeight: 500 }}>{x.hint}</span>
              {x.badge > 0 && <span style={{ padding: "2px 6px", background: t.warn, color: "#fff", borderRadius: 8, fontSize: 10, fontFamily: "'Geist Mono', monospace", fontWeight: 700 }}>{x.badge}</span>}
            </button>
          );
        })}
      </div>

      {tab === "overview" && <OverviewTab t={t} state={state} tasks={tasks} goTasks={() => setTab("tasks")} onAgent={onAgent}/>}
      {tab === "whatsapp" && <WhatsAppPanel t={t} state={state} onAgent={onAgent}/>}
      {tab === "tasks" && <TasksTab t={t} tasks={tasks} counts={counts} onOpen={setOpenTask} update={update}/>}

      {openTask && (
        <TaskDetail
          t={t}
          task={tasks.find(x => x.id === openTask)}
          onAgent={onAgent}
          onClose={() => setOpenTask(null)}
          onApprove={(impact) => { update(openTask, { status: "approved", impact, qc: { verified: true, flag: null } }); setOpenTask(null); }}
          onRevise={(reason) => { update(openTask, { status: "flagged", qc: { verified: false, flag: reason } }); setOpenTask(null); }}
        />
      )}
    </div>
  );
}

const STATUS_META = {
  approved:    { label: "Approved",    color: "ok",     icon: "check" },
  in_progress: { label: "In progress", color: "accent", icon: "play" },
  submitted:   { label: "For review",  color: "info",   icon: "eye" },
  flagged:     { label: "Flagged",     color: "warn",   icon: "flag" },
  assigned:    { label: "Assigned",    color: "muted",  icon: "clock" },
};

function TasksTab({ t, tasks, counts, onOpen, update }) {
  const [filter, setFilter] = React.useState("all");
  const order = ["flagged", "submitted", "in_progress", "assigned", "approved"];
  const filt = filter === "all" ? tasks : tasks.filter(x => x.status === filter);
  filt.sort((a, b) => order.indexOf(a.status) - order.indexOf(b.status));

  return (
    <>
      {/* Filter chips */}
      <div style={{ display: "flex", gap: 8, marginBottom: 16, flexWrap: "wrap" }}>
        {[
          { id: "all", label: "All", n: tasks.length },
          { id: "flagged", label: "Flagged", n: counts.flagged, c: t.warn },
          { id: "submitted", label: "For review", n: counts.submitted, c: t.info },
          { id: "in_progress", label: "In progress", n: counts.in_progress, c: t.accent },
          { id: "assigned", label: "Assigned", n: counts.assigned, c: t.muted },
          { id: "approved", label: "Approved", n: counts.approved, c: t.ok },
        ].map(f => {
          const active = filter === f.id;
          return (
            <button key={f.id} onClick={() => setFilter(f.id)} style={{
              padding: "7px 12px", borderRadius: 999,
              background: active ? t.ink : t.surface,
              color: active ? "#fff" : t.ink,
              border: `1px solid ${active ? t.ink : t.line}`,
              cursor: "pointer", fontFamily: "inherit", fontSize: 12, fontWeight: 600,
              display: "flex", alignItems: "center", gap: 6,
            }}>
              {f.c && <span style={{ width: 7, height: 7, borderRadius: 4, background: f.c, display: "inline-block" }}/>}
              {f.label}
              <span style={{ fontFamily: "'Geist Mono', monospace", fontSize: 11, color: active ? "rgba(255,255,255,0.6)" : t.muted }}>{f.n}</span>
            </button>
          );
        })}
        <button style={{ marginLeft: "auto", padding: "7px 14px", borderRadius: 999, background: t.accent, color: t.accentInk, border: 0, cursor: "pointer", fontFamily: "inherit", fontSize: 12, fontWeight: 700 }}>+ Add task</button>
      </div>

      {/* Task rows */}
      <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
        {filt.map(x => <TaskRow key={x.id} t={t} task={x} onOpen={() => onOpen(x.id)}/>)}
      </div>
    </>
  );
}

function TaskRow({ t, task, onOpen }) {
  const meta = STATUS_META[task.status];
  const cMap = { ok: t.ok, accent: t.accent, info: t.info, warn: t.warn, muted: t.muted };
  const c = cMap[meta.color];

  return (
    <div onClick={onOpen} style={{
      padding: "14px 16px", borderRadius: 12, background: t.surface,
      border: `1px solid ${task.status === "flagged" ? `color-mix(in oklch, ${t.warn} 40%, transparent)` : t.line}`,
      cursor: "pointer", display: "grid", gridTemplateColumns: "auto 1fr auto auto auto",
      gap: 14, alignItems: "center", transition: "all .12s",
    }}
    onMouseEnter={(e) => e.currentTarget.style.borderColor = t.accent}
    onMouseLeave={(e) => e.currentTarget.style.borderColor = task.status === "flagged" ? `color-mix(in oklch, ${t.warn} 40%, transparent)` : t.line}>
      {/* Status dot */}
      <div style={{ width: 10, height: 10, borderRadius: 5, background: c, flexShrink: 0, boxShadow: task.status === "in_progress" ? `0 0 0 3px color-mix(in oklch, ${c} 25%, transparent)` : "none" }}/>

      {/* Title + tag + priority */}
      <div style={{ minWidth: 0 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 2 }}>
          <div style={{ fontSize: 10, fontFamily: "'Geist Mono', monospace", color: t.muted, letterSpacing: 1, fontWeight: 700 }}>{task.id}</div>
          <div style={{ padding: "2px 6px", background: t.surface2, borderRadius: 3, fontSize: 10, fontFamily: "'Geist Mono', monospace", letterSpacing: 1, color: t.ink2, fontWeight: 700 }}>{task.tag.toUpperCase()}</div>
          {task.priority === "high" && <div style={{ fontSize: 10, fontFamily: "'Geist Mono', monospace", color: t.warn, letterSpacing: 1, fontWeight: 700 }}>HIGH</div>}
        </div>
        <div style={{ fontSize: 14, fontWeight: 500, color: t.ink, lineHeight: 1.35 }}>{task.title}</div>
        {task.qc.flag && <div style={{ fontSize: 11.5, color: t.warn, marginTop: 4 }}>⚠ {task.qc.flag}</div>}
        {task.impact && <div style={{ fontSize: 11.5, color: t.ok, marginTop: 4 }}>↑ {task.impact.metric} {task.impact.change > 0 ? "+" : ""}{task.impact.change}{task.impact.unit} · {task.impact.note}</div>}
      </div>

      {/* Mentor */}
      <div style={{ display: "flex", alignItems: "center", gap: 4, fontSize: 11, color: t.muted, fontFamily: "'Geist Mono', monospace" }}>
        <Icon name="spark" size={12}/>{task.mentor.count}
      </div>

      {/* Due */}
      <div style={{ fontSize: 11.5, color: t.ink2, fontFamily: "'Geist Mono', monospace", whiteSpace: "nowrap" }}>{task.due}</div>

      {/* Status pill */}
      <div style={{ padding: "4px 10px", borderRadius: 999, background: `color-mix(in oklch, ${c} 14%, transparent)`, color: c, fontSize: 11, fontWeight: 700, whiteSpace: "nowrap", textAlign: "center", minWidth: 100 }}>
        {meta.label}
      </div>
    </div>
  );
}

  const catalog = window.AGENT_CATALOG || {};

  // Live tick volumes for select agents (others show static "active" status)
  const tickMap = {
    "Sourcer":              { base: state.pulse.sourcer, sub: "replies today",         tick: 4 },
    "Sales Advisor":        { base: 312,                 sub: "objections handled",     tick: 2 },
    "Selection Bot":        { base: 184,                 sub: "tests scored",           tick: 1 },
    "Admission Advisor":    { base: state.pulse.cs,      sub: "queries resolved",       tick: 2 },
    "Onboarding":           { base: state.pulse.onboard, sub: "joined this batch",      tick: 0 },
    "Personal Trainer":     { base: state.pulse.trainer, sub: "lessons delivered",      tick: 12 },
    "Personal Mentor":      { base: state.pulse.mentor,  sub: "coaching replies",       tick: 9 },
    "Motivator":            { base: 487,                 sub: "nudges sent",            tick: 5 },
    "Peer Mentor System":   { base: 256,                 sub: "peer reviews",           tick: 3 },
    "Live Session Tracker": { base: 42,                  sub: "sessions audited",       tick: 0 },
    "Examiner":             { base: state.pulse.examiner,sub: "gates scored",           tick: 1 },
    "Leaderboard":          { base: 16,                  sub: "re-ranked",              tick: 0 },
    "Promotion Bot":        { base: 23,                  sub: "graduated this week",    tick: 0 },
    "Orchestrator":         { base: "↻",                 sub: "routing all flows",      tick: 0 },
    "Campaign Planner":     { base: 7,                   sub: "active campaigns",       tick: 0 },
  };

  const allAgents = phases.flatMap(p => p.agents);
  const initialVals = allAgents.map(a => tickMap[a]?.base ?? "—");
  const [vals, setVals] = React.useState(initialVals);
  const [openAgent, setOpenAgent] = React.useState(null);

  React.useEffect(() => {
    const id = setInterval(() => {
      setVals(prev => prev.map((v, i) => {
        const cfg = tickMap[allAgents[i]];
        if (!cfg || typeof v !== "number" || !cfg.tick) return v;
        return Math.random() < 0.6 ? v + cfg.tick : v;
      }));
    }, 2200);
    return () => clearInterval(id);
  }, []);

  const headline = [
    { k: "Human ops",          v: "1",     s: "founder" },
    { k: "Cost / consultant",  v: "₹340",  s: "vs ₹2,800 at BYJU's" },
    { k: "Gross margin",       v: "86%",   s: "placement fees" },
    { k: "Scale ceiling",      v: "5,000", s: "no new hires needed" },
  ];

  const rules = window.MANDATORY_RULES || [];
  const metrics = window.SUCCESS_METRICS || [];

  // Render an agent card
  const AgentCard = ({ name, phaseColor, idx }) => {
    const cfg = tickMap[name] || { sub: "live" };
    const v = vals[idx];
    const showVal = v != null && v !== "—";
    return (
      <div
        onClick={() => setOpenAgent(name)}
        role="button"
        tabIndex={0}
        onKeyDown={(e) => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); setOpenAgent(name); } }}
        style={{
          background: t.surface, border: `1px solid ${t.line}`, borderRadius: 12,
          padding: 14, position: "relative", overflow: "hidden", cursor: "pointer",
          transition: "transform 120ms ease, border-color 120ms ease",
          minHeight: 96,
        }}
        onMouseEnter={(e) => { e.currentTarget.style.transform = "translateY(-2px)"; e.currentTarget.style.borderColor = phaseColor; }}
        onMouseLeave={(e) => { e.currentTarget.style.transform = "none"; e.currentTarget.style.borderColor = t.line; }}
      >
        <div style={{ position: "absolute", top: 0, left: 0, width: 3, height: "100%", background: phaseColor }}/>
        <div style={{ fontSize: 9.5, fontFamily: mono, letterSpacing: 1.5, color: phaseColor, textTransform: "uppercase", fontWeight: 700 }}>
          AI · {name}
        </div>
        {showVal && (
          <div style={{ fontFamily: mono, fontSize: 26, fontWeight: 500, letterSpacing: -0.8, fontVariantNumeric: "tabular-nums", marginTop: 6, lineHeight: 1 }}>
            {typeof v === "number" ? v.toLocaleString("en-IN") : v}
          </div>
        )}
        <div style={{ fontSize: 11, color: t.ink2, marginTop: showVal ? 4 : 8 }}>{cfg.sub}</div>
        <div style={{ position: "absolute", top: 10, right: 10, fontFamily: mono, fontSize: 9, color: t.muted, letterSpacing: 1.5, fontWeight: 700 }}>↗</div>
      </div>
    );
  };

  // Index lookup so card knows its global index
  let runningIdx = 0;
  const indexOf = (name) => allAgents.indexOf(name);

  return (
    <div style={{ minHeight: "100vh", background: t.bg, padding: "32px 48px 48px" }}>
      {/* Hero */}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-end", marginBottom: 24 }}>
        <div>
          <div style={{ fontFamily: mono, fontSize: 10, letterSpacing: 2.5, color: t.accent, textTransform: "uppercase", fontWeight: 700 }}>
            Investor view · AI Intern Platform · April 2026
          </div>
          <div style={{ fontFamily: serif, fontSize: 58, letterSpacing: -2, lineHeight: 0.98, marginTop: 10, maxWidth: 980, fontWeight: 400 }}>
            22 agents. <em style={{ color: t.accent }}>One human.</em> A two-sided AI intern platform.
          </div>
          <div style={{ fontSize: 13, color: t.ink2, marginTop: 10, maxWidth: 820, lineHeight: 1.55 }}>
            On one side: tier-2/3 graduates trained to be AI interns in ≤ 90 days.
            On the other: MSMEs who get a free 30-day trial — pay only if the outcome lands.
            Both funnels run on the same 22-agent OS. Click any agent for its operating manual.
          </div>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
          <span style={{ width: 8, height: 8, borderRadius: 4, background: t.ok, animation: "pulse 1.2s infinite" }}/>
          <span style={{ fontSize: 11, color: t.muted, fontFamily: mono, letterSpacing: 1.5, textTransform: "uppercase", fontWeight: 700 }}>LIVE FEED</span>
        </div>
      </div>

      {/* Headline numbers */}
      <div style={{ padding: 28, borderRadius: 14, background: t.ink, color: "#fff", display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 32, marginBottom: 26 }}>
        {headline.map((m, i) => (
          <div key={i} style={{ borderLeft: i > 0 ? "1px solid rgba(255,255,255,0.08)" : "none", paddingLeft: i > 0 ? 32 : 0 }}>
            <div style={{ fontSize: 10, fontFamily: mono, letterSpacing: 2, color: "rgba(255,255,255,0.5)", textTransform: "uppercase", fontWeight: 700 }}>{m.k}</div>
            <div style={{ fontFamily: serif, fontSize: 60, letterSpacing: -1.5, color: t.accent, lineHeight: 0.95, marginTop: 8 }}>{m.v}</div>
            <div style={{ fontSize: 12, color: "rgba(255,255,255,0.65)", marginTop: 6 }}>{m.s}</div>
          </div>
        ))}
      </div>

      {/* Phase-grouped agent map */}
      <div style={{ fontFamily: mono, fontSize: 10, letterSpacing: 2.5, color: t.muted, textTransform: "uppercase", fontWeight: 700, marginBottom: 14 }}>
        BUILD pipeline · click any agent for full operating manual
      </div>

      {phases.map((p, pi) => (
        <div key={p.key} style={{ marginBottom: 22 }}>
          <div style={{ display: "flex", alignItems: "baseline", gap: 10, marginBottom: 10 }}>
            <span style={{ width: 8, height: 8, borderRadius: 2, background: p.color, display: "inline-block" }}/>
            <div style={{ fontFamily: mono, fontSize: 11, letterSpacing: 2, color: t.ink, textTransform: "uppercase", fontWeight: 700 }}>
              {pi + 1}. {p.key}
            </div>
            <div style={{ fontFamily: mono, fontSize: 10, color: t.muted, letterSpacing: 1.5, fontWeight: 600 }}>
              · {p.agents.length} agent{p.agents.length > 1 ? "s" : ""}
            </div>
          </div>
          <div style={{
            display: "grid",
            gridTemplateColumns: p.agents.length === 1
              ? "minmax(280px, 360px)"
              : `repeat(${Math.min(p.agents.length, 5)}, 1fr)`,
            gap: 10,
          }}>
            {p.agents.map(a => <AgentCard key={a} name={a} phaseColor={p.color} idx={indexOf(a)} />)}
          </div>
        </div>
      ))}

      {/* Mandatory Rules */}
      <div style={{ marginTop: 36, marginBottom: 26 }}>
        <div style={{ fontFamily: mono, fontSize: 10, letterSpacing: 2.5, color: t.muted, textTransform: "uppercase", fontWeight: 700, marginBottom: 12 }}>
          Mandatory rules · exit criteria
        </div>
        <div style={{ border: `1px solid ${t.line}`, borderRadius: 12, overflow: "hidden" }}>
          <div style={{ display: "grid", gridTemplateColumns: "1.4fr 1.2fr 1fr", background: t.ink, color: t.bg }}>
            {["Rule", "Consequence", "Enforced by"].map((h, i) => (
              <div key={i} style={{ padding: "12px 16px", fontFamily: mono, fontSize: 10, letterSpacing: 2, fontWeight: 700, textTransform: "uppercase", borderLeft: i ? "1px solid rgba(255,255,255,0.08)" : "none" }}>
                {h}
              </div>
            ))}
          </div>
          {rules.map((r, i) => (
            <div key={i} style={{
              display: "grid", gridTemplateColumns: "1.4fr 1.2fr 1fr",
              background: i % 2 === 0 ? t.surface : "transparent",
              borderTop: `1px solid ${t.line}`,
            }}>
              <div style={{ padding: "12px 16px", fontSize: 13, color: t.ink, lineHeight: 1.5 }}>{r.rule}</div>
              <div style={{ padding: "12px 16px", fontSize: 13, color: t.ink, lineHeight: 1.5, borderLeft: `1px solid ${t.line}` }}>{r.consequence}</div>
              <div style={{ padding: "12px 16px", fontSize: 12, color: t.ink2, lineHeight: 1.5, borderLeft: `1px solid ${t.line}`, fontFamily: mono }}>{r.by}</div>
            </div>
          ))}
        </div>
      </div>

      {/* Success Metrics */}
      <div style={{ marginBottom: 26 }}>
        <div style={{ fontFamily: mono, fontSize: 10, letterSpacing: 2.5, color: t.muted, textTransform: "uppercase", fontWeight: 700, marginBottom: 12 }}>
          Project 1 BUILD · success metrics
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 10 }}>
          {metrics.map((m, i) => (
            <div key={i} style={{ background: t.surface, border: `1px solid ${t.line}`, borderRadius: 12, padding: 16 }}>
              <div style={{ fontFamily: mono, fontSize: 9.5, letterSpacing: 1.5, color: t.accent, textTransform: "uppercase", fontWeight: 700 }}>{m.k}</div>
              <div style={{ fontFamily: mono, fontSize: 24, fontWeight: 500, letterSpacing: -0.5, marginTop: 6, color: t.ink }}>{m.v}</div>
              <div style={{ fontSize: 11.5, color: t.ink2, marginTop: 6, lineHeight: 1.45 }}>{m.s}</div>
            </div>
          ))}
        </div>
      </div>

      {/* Defensibility */}
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 16 }}>
        {[
          { k: "The moat", t: "D2D Rank", d: "A living, publicly verifiable score. Once employers hire by it, switching costs shift to us — not to any individual tool." },
          { k: "The wedge", t: "Tier-2 + WhatsApp", d: "No app install, Hindi/regional-first, ₹0 up-front fee. BYJU's and Upgrad can't reach this user without breaking their own economics." },
          { k: "The engine", t: "Agent orchestration", d: "22 specialised agents (15 candidate + 7 client) + 1 founder. Every new batch and every new client is ~0 marginal human cost. Scale to 5K interns and 50K clients without hiring." },
        ].map((b, i) => (
          <div key={i} style={{ padding: 24, borderRadius: 14, background: t.surface, border: `1px solid ${t.line}` }}>
            <div style={{ fontSize: 10, fontFamily: mono, letterSpacing: 2, color: t.accent, textTransform: "uppercase", fontWeight: 700 }}>{b.k}</div>
            <div style={{ fontFamily: serif, fontSize: 32, letterSpacing: -0.6, marginTop: 6 }}>{b.t}</div>
            <div style={{ fontSize: 13, color: t.ink2, marginTop: 10, lineHeight: 1.55 }}>{b.d}</div>
          </div>
        ))}
      </div>

      <AgentDetail agentKey={openAgent} theme={t} onClose={() => setOpenAgent(null)} />
    </div>
  );
}

Object.assign(window, { InvestorApp });

</script>
<script type="text/babel">

function App() {
  const [state, setState] = React.useState({
    priyaBatch: 19, priyaDay: 14, priyaStreak: 13, priyaRank: null, priyaScore: null,
    clientMatched: null, clientWeek: 3, queueResolved: [],
    pulse: { sourcer: 847, cs: 312, onboard: 89, trainer: 1247, mentor: 2108, examiner: 184, ranker: 16, match: 34, field: 612, qc: 28 },
  });
  const patch = (p) => setState(s => ({ ...s, ...p }));
  const theme = window.resolveTheme("bharat", "light");
  const themeDark = window.resolveTheme("bharat", "dark");
  return <Shell theme={theme} themeDark={themeDark} state={state} patch={patch}/>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
</body>
</html>
